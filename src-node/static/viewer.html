<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>IFC MCP Viewer</title>
  <style>
    html,
    body,
    bim-grid {
      width: 100%;
      height: 100%;
      margin: 0;
    }

    body {
      overflow: hidden;
    }
  </style>
</head>
<body>
  <bim-grid id="ifc-viewer"></bim-grid>

  <script type="module">
    import { IfcViewer } from "https://cdn.flinker.app/ifc-viewer/v3.3.2/ifc-viewer.es.js";

    async function bytesFrom(url) {
      const response = await fetch(url);
      if (!response.ok) {
        throw new Error(`${response.status} ${response.statusText}`);
      }
      return new Uint8Array(await response.arrayBuffer());
    }

    async function jsonFrom(url) {
      const response = await fetch(url);
      if (!response.ok) {
        throw new Error(`${response.status} ${response.statusText}`);
      }
      return response.json();
    }

    try {
      const viewer = new IfcViewer("#ifc-viewer");
      window.ifcMcpViewer = viewer;
      await viewer.ready;

      const loadedModels = new Set();
      const loadingModels = new Set();
      let loadedBcfVersion = 0;
      let applyingBcf = false;

      async function loadModels(state, quiet = false) {
        const models = Array.isArray(state.models) ? state.models : [];
        const stateModelIds = new Set(models.map((model) => model.id).filter(Boolean));
        const hasStaleModels = [...loadedModels].some((id) => !stateModelIds.has(id));
        if (hasStaleModels || (!models.length && loadedModels.size)) {
          window.location.reload();
          return;
        }

        for (const model of models) {
          if (!model.id || loadedModels.has(model.id) || loadingModels.has(model.id)) {
            continue;
          }
          loadingModels.add(model.id);
          try {
            await viewer.add(
              model.filename || "model.ifc",
              await bytesFrom(`/models/${encodeURIComponent(model.id)}`)
            );
            loadedModels.add(model.id);
          } catch (error) {
            loadedModels.delete(model.id);
            throw error;
          } finally {
            loadingModels.delete(model.id);
          }
        }
      }

      async function applyBcfState(state, quiet = false) {
        if (!state.has_bcf || state.bcf_version <= loadedBcfVersion || applyingBcf) {
          return;
        }

        applyingBcf = true;
        try {
          const safeName = state.bcf_filename || "viewpoint.bcfzip";
          const versionedName = `${state.bcf_version}-${safeName}`;
          await viewer.add(
            versionedName,
            await bytesFrom(`/bcf?version=${state.bcf_version}`)
          );

          if (state.bcf_topic_guid && typeof viewer.select === "function") {
            await viewer.select(state.bcf_topic_guid);
          }
          loadedBcfVersion = state.bcf_version;
        } finally {
          applyingBcf = false;
        }
      }

      async function syncViewer(quiet = false) {
        const state = await jsonFrom("/state");
        document.title = state.title || "IFC MCP Viewer";
        await loadModels(state, quiet);
        await applyBcfState(state, quiet);
      }

      await syncViewer(false);

      window.setInterval(async () => {
        try {
          await syncViewer(true);
        } catch (error) {
          console.warn("IFC MCP state poll failed", error);
        }
      }, 1000);
    } catch (error) {
      console.error(error);
    }
  </script>
</body>
</html>
